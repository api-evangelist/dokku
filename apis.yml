aid: dokku
name: Dokku
description: >-
  Dokku is an open-source Docker-powered self-hosted Platform-as-a-Service that
  helps you build and manage the lifecycle of applications from initial push to
  scaling out. Often described as "the smallest PaaS implementation you've ever
  seen" and a self-hosted mini-Heroku, Dokku turns a single Linux host (or a
  multi-host scheduler such as K3s or Nomad) into a git-push deployment target
  that builds applications from Heroku-compatible buildpacks, Cloud Native
  Buildpacks, Nixpacks, Railpack, Dockerfiles, or pre-built Docker images.
  Dokku is MIT licensed, written primarily in Bash, and maintained by the
  Dokku organization on GitHub since 2013. It ships an extensive plugin
  ecosystem covering data stores (Postgres, MySQL, MariaDB, Redis, MongoDB,
  RabbitMQ, Elasticsearch, ClickHouse, Meilisearch, Typesense), TLS via
  Let's Encrypt, HTTP basic auth, maintenance mode, redirects, schedulers
  for Docker, K3s and Nomad, multiple HTTP proxies (Nginx, HAProxy, Caddy,
  Traefik, OpenResty), CI integrations, and an official GitHub Action.
  Dokku's primary interface is the `dokku` CLI invoked over SSH; there is
  no first-party public HTTP REST API in core (the historical `dokku-api`
  Ruby wrapper is archived and unmaintained).
